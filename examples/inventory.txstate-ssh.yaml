# Example inventory for plain SSH hosts that already support key-based login
# through ~/.ssh/config aliases.
defaults:
  poll_seconds: 20

host_policies:
  - host: sun
    max_active_fraction: 0.5
  - host: moon
    max_active_fraction: 0.5

slots:
  - name: sun-g0
    backend: ssh
    host: sun
    gpu: 0
    run_root: /home/sqp17/slot-scheduler/runs
    tags: [ssh, sshkey, txstate]

  - name: sun-g1
    backend: ssh
    host: sun
    gpu: 1
    run_root: /home/sqp17/slot-scheduler/runs
    tags: [ssh, sshkey, txstate]

